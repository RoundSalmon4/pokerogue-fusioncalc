name: Verify FusionCalc (SVH v1)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'fusioncalc.py'
      - '.github/workflows/verify-fusioncalc.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'fusioncalc.py'

jobs:
  svh-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run SVH v1 verifier against production (fusioncalc.py)
        shell: bash
        run: |
          python - << 'PY'
          from __future__ import annotations
          import sys, os, re, json, hashlib, ast, time

          HEADER_RE   = re.compile(r'^\s*#\s*BUILD_HASH:\s*([0-9a-fA-F]{12})\s*$')
          BUILDTAG_RE = re.compile(r'^\s*BUILD_TAG\s*=\s*([\"\'])\s*([^\"\\']*)\s*\1\s*$')

          def _normalize(s: str) -> str:
              return s.replace('\r\n','\n').replace('\r','\n')

          def canonicalize(text: str):
              s = _normalize(text)
              lines = s.split('\n')
              header_idx = -1
              header_hash = ''
              if lines and HEADER_RE.match(lines[0]):
                  header_idx = 0
                  header_hash = HEADER_RE.match(lines[0]).group(1).lower()
                  lines = lines[1:]
              for i, ln in enumerate(lines):
                  if BUILDTAG_RE.match(ln):
                      lines[i] = 'BUILD_TAG = ""'
                      break
              return '\n'.join(lines), header_hash, header_idx

          def compute_hash(canon: str) -> str:
              return hashlib.sha256(canon.encode('utf-8')).hexdigest()[:12]

          def verify(path: str):
              t0 = time.time()
              raw = open(path,'rb').read()
              text = raw.decode('utf-8')
              canon, header_hash, header_idx = canonicalize(text)
              comp = compute_hash(canon)

              header_ok = (header_idx == 0 and header_hash == comp)

              buildtag_val = None
              for ln in _normalize(text).split('\n'):
                  m = BUILDTAG_RE.match(ln)
                  if m:
                      buildtag_val = m.group(2)
                      break
              buildtag_ok = (buildtag_val == comp) if buildtag_val is not None else True

              try:
                  ast.parse(text)
                  ast_ok = True
              except SyntaxError:
                  ast_ok = False

              ok = header_ok and ast_ok and buildtag_ok
              return ok, {
                'reported_hash': header_hash or None,
                'computed_hash': comp,
                'header_top': (header_idx == 0),
                'buildtag_present': (buildtag_val is not None),
                'buildtag_value': buildtag_val,
                'buildtag_matches': (buildtag_val == comp) if buildtag_val is not None else None,
                'ast_ok': ast_ok,
                'size_bytes': len(raw),
                'duration_ms': round((time.time()-t0)*1000,2),
                'svh_version': 'SVH v1'
              }

          path = 'fusioncalc.py'
          if not os.path.exists(path):
              msg = json.dumps({'ok': False, 'evidence': {'error': f'{path} not found'}}, indent=2)
              print(msg)
              with open(os.environ.get('GITHUB_STEP_SUMMARY', '/tmp/summary.md'), 'a') as f:
                  f.write(f"❌ SVH verification **FAILED** — {path} not found.\n")
              sys.exit(2)

          ok, ev = verify(path)
          payload = {'ok': ok, 'evidence': ev}
          print(json.dumps(payload, indent=2))

          # Explicit pass/fail line
          print("RESULT:", "PASSED" if ok else "FAILED")

          # Run summary
          with open(os.environ.get('GITHUB_STEP_SUMMARY', '/tmp/summary.md'), 'a') as f:
              if ok:
                  f.write(f"✅ SVH verification **PASSED** for `{path}`\\n")
                  f.write(f"- Reported/Computed Hash: `{ev['computed_hash']}`\\n")
                  f.write(f"- Header at top: `{ev['header_top']}`\\n")
                  f.write(f"- BUILD_TAG matches: `{ev['buildtag_matches']}`\\n")
                  f.write(f"- AST OK: `{ev['ast_ok']}`\\n")
                  f.write(f"- Size: `{ev['size_bytes']} bytes` — Duration: `{ev['duration_ms']} ms`\\n")
              else:
                  f.write(f"❌ SVH verification **FAILED** for `{path}`\\n")
                  f.write("See logs for detailed evidence.\\n")

          sys.exit(0 if ok else 2)
          PY
