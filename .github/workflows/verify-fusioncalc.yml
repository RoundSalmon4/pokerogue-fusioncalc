name: Verify fusioncalc.py (raw bytes, EOF-tolerant)

on:
  push:
    paths:
      - 'fusioncalc.py'
      - 'fusioncalc_verify.py'
      - '.github/workflows/verify-fusioncalc.yml'
  pull_request:
    paths:
      - 'fusioncalc.py'
      - 'fusioncalc_verify.py'
      - '.github/workflows/verify-fusioncalc.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: fusioncalc verifier (raw)
    runs-on: ubuntu-latest

    steps:
      - name: Prepare env
        shell: bash
        run: |
          set -euo pipefail
          echo "REPO=${{ github.repository }}" >> "$GITHUB_ENV"
          echo "SHA=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "TMP_DIR=$RUNNER_TEMP/fusioncalc_ci" >> "$GITHUB_ENV"

      - name: Fetch raw files for current commit (no checkout)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$TMP_DIR"
          curl -fsSL -o "$TMP_DIR/fusioncalc.py"        "https://raw.githubusercontent.com/$REPO/$SHA/fusioncalc.py"
          curl -fsSL -o "$TMP_DIR/fusioncalc_verify.py" "https://raw.githubusercontent.com/$REPO/$SHA/fusioncalc_verify.py"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify (EOF-tolerant) using repo script + stable check
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, re, json, hashlib, importlib.util, pathlib, sys

          TMP = pathlib.Path(os.environ["TMP_DIR"])
          fcalc = TMP / "fusioncalc.py"
          fver  = TMP / "fusioncalc_verify.py"

          # Import the repo's verifier as a module
          spec = importlib.util.spec_from_file_location("fusioncalc_verify", str(fver))
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)  # type: ignore

          ok_repo, ev = mod.verify(str(fcalc))

          # Build a "stable EOF" canonical hash (exactly one trailing '\n')
          HEADER_RE   = re.compile(r'^\s*#\s*BUILD_HASH:\s*([0-9a-fA-F]{12})\s*$')
          BUILDTAG_RE = re.compile(r'^\s*BUILD_TAG\s*=\s*([\"\\\'])\s*([^\"\\\']*)\s*\\1\s*$')

          raw_text = fcalc.read_bytes().decode("utf-8")
          def canonicalize_stable(text: str):
            s = text.replace('\r\n','\n').replace('\r','\n')
            lines = s.split('\n')
            if lines and HEADER_RE.match(lines[0]):
              lines = lines[1:]
            for i, ln in enumerate(lines):
              if BUILDTAG_RE.match(ln):
                lines[i] = 'BUILD_TAG = ""'
                break
            # minimal stable EOF rule
            return '\n'.join(lines).rstrip('\n') + '\n'

          stable_hash = hashlib.sha256(canonicalize_stable(raw_text).encode('utf-8')).hexdigest()[:12]

          header = ev.get("reported_hash")
          buildtag_val = ev.get("buildtag_value")
          ast_ok = bool(ev.get("ast_ok"))

          # Accept if:
          #  1) AST is OK AND
          #  2) header exists AND
          #  3) (repo-computed == header OR stable-eof-computed == header) AND
          #  4) if BUILD_TAG present, it equals header
          tag_ok = (buildtag_val is None) or (buildtag_val == header)
          pass_eof_tolerant = ast_ok and header and tag_ok and (
              ev["computed_hash"] == header or stable_hash == header
          )

          summary = {
            "header": header,
            "computed_repo": ev["computed_hash"],
            "computed_stable_eof": stable_hash,
            "buildtag_value": buildtag_val,
            "ast_ok": ast_ok,
            "pass_eof_tolerant": bool(pass_eof_tolerant),
            "evidence": ev
          }
          print(json.dumps(summary, indent=2))

          if not pass_eof_tolerant:
            # Emit a GitHub annotation for quick visibility
            print(f"::error title=Verification failed::Header {header} "
                  f"!= computed_repo {ev['computed_hash']} and != computed_stable {stable_hash}")
            sys.exit(2)
          PY

      - name: Purge temporary files
        if: always()
        shell: bash
        run: |
          rm -rf "$TMP_DIR"
