name: Verify & Sync BUILD_HASH/BUILD_TAG (byte-safe)

on:
  push:
    paths:
      - 'fusioncalc.py'
      - 'fusioncalc_verify.py'
      - '.github/workflows/verify-fusioncalc.yml'
  pull_request:
    paths:
      - 'fusioncalc.py'
      - 'fusioncalc_verify.py'
      - '.github/workflows/verify-fusioncalc.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: compute → in-place patch → re-verify → (optional) commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Compute canonical hash, patch values IN-PLACE, and re-verify
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          import re, os, sys, json, importlib.util
          from pathlib import Path

          FCALC = Path("fusioncalc.py")
          FVER  = Path("fusioncalc_verify.py")

          if not FCALC.exists():
              print("::error title=Missing file::fusioncalc.py not found at repo root")
              sys.exit(2)
          if not FVER.exists():
              print("::error title=Missing file::fusioncalc_verify.py not found at repo root")
              sys.exit(2)

          # Load repo verifier
          spec = importlib.util.spec_from_file_location("fusioncalc_verify", str(FVER))
          mod = importlib.util.module_from_spec(spec)  # type: ignore
          spec.loader.exec_module(mod)                 # type: ignore

          # 1) Compute current canonical hash using repo rules
          ok0, ev0 = mod.verify(str(FCALC))
          comp = ev0["computed_hash"]  # 12-hex

          # 2) IN-PLACE byte-safe replacement (values only)
          b = FCALC.read_bytes()

          # Preserve spacing/quotes/EOLs; replace only the 12-hex payloads
          HEADER_RE = re.compile(
              br'(?m)^(?P<prefix>\s*#\s*BUILD_HASH:\s*)(?P<val>[0-9a-fA-F]{12})(?P<suffix>\s*(?:\r?\n|$))'
          )
          TAG_RE = re.compile(
              br'(?m)^(?P<prefix>\s*BUILD_TAG\s*=\s*)(?P<quote>["\'])(?P<val>[^"\']*)(?P=quote)(?P<suffix>\s*(?:\r?\n|$))'
          )

          # Replace header (must exist)
          if HEADER_RE.search(b):
              b = HEADER_RE.sub(lambda m: m.group("prefix") + comp.encode("ascii") + m.group("suffix"), b, count=1)
          else:
              print("::error title=Header missing::Expected '# BUILD_HASH: <12-hex>' line.")
              sys.exit(2)

          # Replace BUILD_TAG (must exist; do not insert to avoid hash drift)
          if TAG_RE.search(b):
              b = TAG_RE.sub(
                  lambda m: m.group("prefix") + m.group("quote") + comp.encode("ascii") + m.group("quote") + m.group("suffix"),
                  b, count=1
              )
          else:
              print("::error title=BUILD_TAG missing::Expected a BUILD_TAG line to update; refusing to insert.")
              sys.exit(2)

          FCALC.write_bytes(b)

          # 3) Re-verify after update
          ok1, ev1 = mod.verify(str(FCALC))
          print(json.dumps({"before": ev0, "after": ev1}, indent=2))

          # Export the hash for the commit step (corrected to use os.environ)
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"hash={comp}\n")

          if not ok1:
              print("::error title=Re-verification failed::File did not pass after header/tag update.")
              sys.exit(2)
          PY

      - name: Commit & push the synchronized header/tag
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'pull_request' &&
           github.event.pull_request.head.repo.full_name == github.repository)
        shell: bash
        run: |
          set -euo pipefail
          if ! git diff --quiet -- fusioncalc.py; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add fusioncalc.py
            git commit -m "CI: sync BUILD_HASH/BUILD_TAG to ${{ steps.sync.outputs.hash }} (byte-safe)"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Final verification (green if synced)
        shell: bash
        run: |
          set -euo pipefail
          python fusioncalc_verify.py fusioncalc.py
