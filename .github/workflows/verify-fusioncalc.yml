name: Verify fusioncalc.py

on:
  push:
    paths:
      - 'fusioncalc.py'
      - 'fusioncalc_verify.py'
      - '.github/workflows/verify-fusioncalc.yml'
  pull_request:
    paths:
      - 'fusioncalc.py'
      - 'fusioncalc_verify.py'
      - '.github/workflows/verify-fusioncalc.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: fusioncalc verifier
    runs-on: ubuntu-latest

    steps:
      # Ensure the runner won't do any CRLF conversion and won't error on "unsafe" EOL
      - name: Configure Git line endings (LF, no autocrlf)
        shell: bash
        run: |
          set -euo pipefail
          git config --global core.autocrlf false
          git config --global core.eol lf
          git config --global core.safecrlf false

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # (Optional) quick byte info to help diagnose if needed; safe to remove
      - name: Debug bytes (optional)
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib, json
          p = pathlib.Path('fusioncalc.py')
          b = p.read_bytes()
          print(json.dumps({
            "size_bytes": len(b),
            "endswith_newline": b.endswith(b"\n"),
            "last_16_bytes_hex": b[-16:].hex() if len(b) >= 16 else b.hex(),
          }, indent=2))
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify BUILD_HASH / BUILD_TAG / AST (repo script)
        shell: bash
        run: |
          set -euo pipefail
          python fusioncalc_verify.py fusioncalc.py
