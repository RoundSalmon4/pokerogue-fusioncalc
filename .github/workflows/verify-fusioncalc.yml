name: Verify fusioncalc.py

on:
  push:
    paths:
      - 'fusioncalc.py'
      - 'fusioncalc_verify.py'
      - '.github/workflows/verify-fusioncalc.yml'
  pull_request:
    paths:
      - 'fusioncalc.py'
      - 'fusioncalc_verify.py'
      - '.github/workflows/verify-fusioncalc.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: fusioncalc verifier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify BUILD_HASH / BUILD_TAG / AST
        shell: bash
        run: |
          set -euo pipefail
          python fusioncalc_verify.py fusioncalc.py
