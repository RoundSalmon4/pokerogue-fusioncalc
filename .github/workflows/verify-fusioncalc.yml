name: Verify FusionCalc (SVH v1)

on:
  workflow_dispatch: {}
  push:
    branches: [ main, master ]
    paths:
      - 'fusioncalc.py'
      - 'ci/svh_ci_verify.py'
      - '.github/workflows/verify-fusioncalc.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'fusioncalc.py'

jobs:
  svh-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: SVH v1 verification (production: fusioncalc.py)
        run: python ci/svh_ci_verify.py
