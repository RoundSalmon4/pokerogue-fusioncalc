name: Verify fusioncalc.py

on:
  push:
    paths:
      - 'fusioncalc.py'
      - '.github/workflows/verify-fusioncalc.yml'
      - '.github/actions/fusioncalc-verify/**'
  pull_request:
    paths:
      - 'fusioncalc.py'
      - '.github/workflows/verify-fusioncalc.yml'
      - '.github/actions/fusioncalc-verify/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Run fusioncalc verifier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run verifier
        shell: bash
        run: |
          python .github/actions/fusioncalc-verify/fusioncalc_verify.py fusioncalc.py
